name: Tests

# Runs the repo's automated tests. Today that is the Lab 03 sample application's
# Jest unit + integration suite — the only tests that run without deployed
# infrastructure. The per-lab validate.sh / test-*.sh scripts are post-deploy
# smoke tests (they call a live ALB / cluster / AWS), so they are not run here.

on:
  push:
    branches: [main]
    paths:
      - 'labs/03-cicd-pipelines/app/**'
      - '.github/workflows/test-labs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'labs/03-cicd-pipelines/app/**'
      - '.github/workflows/test-labs.yml'

jobs:
  lab03-app:
    name: Lab 03 — sample app (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labs/03-cicd-pipelines/app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

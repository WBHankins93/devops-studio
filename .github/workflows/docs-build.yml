name: Docs — Build & Deploy

# Builds the VitePress site. The build fails on any broken internal link
# (VitePress dead-link detection), so this also serves as link-check CI on PRs.
# On pushes to main it deploys the site to GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.vitepress/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-build.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - '.vitepress/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastUpdated needs full git history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build site (fails on broken links)
        run: npm run docs:build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    # Only deploy from main; PRs just build (link-check) above.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

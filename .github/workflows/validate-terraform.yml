name: Validate Terraform

# Format-check, init, and validate the Terraform in every lab that has it.
# Runs on the real Terraform roots only — labs 03-06 have no Terraform.

on:
  push:
    branches: [main]
    paths:
      - 'labs/**/*.tf'
      - '.github/workflows/validate-terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'labs/**/*.tf'
      - '.github/workflows/validate-terraform.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lab:
          - 01-terraform-foundations
          - 02-kubernetes-platform
          - 07-serverless-operations
          - 08-platform-engineering
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Format check
        run: terraform fmt -check -recursive labs/${{ matrix.lab }}/

      - name: Init (no backend)
        run: terraform init -backend=false
        working-directory: labs/${{ matrix.lab }}

      - name: Validate
        run: terraform validate
        working-directory: labs/${{ matrix.lab }}
